<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Events Map</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
}

.container{
  display:flex;
  flex-wrap:wrap;
  height:100vh;
}

.sidebar{
  width:350px;
  background:#fff;
  padding:20px;
  overflow:auto;
  border-right:1px solid #ddd;
}

.sidebar h2{
  margin-top:0;
}

.form-group{
  margin-bottom:12px;
}

input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#0d6efd;
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  background:#0b5ed7;
}

#map{
  flex:1;
  min-height:100vh;
}

.event-card{
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-top:10px;
  background:#fafafa;
}

.distance{
  color:#666;
  margin:8px 0;
}

.go-btn{
  background:#198754;
}

.go-btn:hover{
  background:#157347;
}

.contact{
  color:#444;
  margin-top:5px;
}

@media(max-width:768px){

  .sidebar{
    width:100%;
  }

  #map{
    width:100%;
    height:60vh;
  }

  .container{
    display:block;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="sidebar">

    <h2>ඔබගේ දන්සල/පහන් කූඩුව එකතු කරන්න</h2>

    <div class="form-group">
      <input type="text" id="eventName" placeholder="Event Name">
    </div>

    <div class="form-group">
      <input type="text" id="lat" placeholder="Latitude">
    </div>

    <div class="form-group">
      <input type="text" id="lng" placeholder="Longitude">
    </div>

    <div class="form-group">
      <input type="text" id="address" placeholder="Address">
    </div>

    <div class="form-group">
      <input type="text" id="contactNumber" placeholder="Contact Number">
    </div>

    <button onclick="addEvent()">
      Submit Event
    </button>

    <hr>

    <h2>සියලුම පොසොන් උත්සව </h2>

    <div id="eventList"></div>

  </div>

  <div id="map"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbygd45vhw6t0SpLdi-a3mtjZLa7Razt39vFTz7alJ3Env-pYgdtqhbGGlAvgGHXC6yz/exec";

let map;
let userPosition = null;
let infoWindow;

async function initMap(){

  map = new google.maps.Map(document.getElementById("map"),{
    zoom:11,
    center:{ lat:25.2854, lng:51.5310 }
  });

  infoWindow = new google.maps.InfoWindow();

  if(navigator.geolocation){

    navigator.geolocation.getCurrentPosition((position)=>{

      userPosition = {
        lat:position.coords.latitude,
        lng:position.coords.longitude
      };

      new google.maps.Marker({
        position:userPosition,
        map:map,
        title:"My Location",
        icon:"http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
      });

      map.setCenter(userPosition);

      loadEvents();

    },()=>{

      loadEvents();
    });

  }else{

    loadEvents();
  }
}

async function loadEvents(){

  const response = await fetch(API_URL);

  const events = await response.json();

  document.getElementById("eventList").innerHTML = "";

  events.forEach(event=>{

    // SHOW ONLY APPROVED EVENTS
    if(
      !event.approval ||
      event.approval.toLowerCase() !== "approved"
    ){
      return;
    }

    const lat = Number(event.lat);
    const lng = Number(event.lng);

    let distanceText = "Distance unavailable";

    if(userPosition){

      const distance = calculateDistance(
        userPosition.lat,
        userPosition.lng,
        lat,
        lng
      );

      distanceText =
        distance.toFixed(2) + " KM away";
    }

    const marker = new google.maps.Marker({
      position:{ lat,lng },
      map:map,
      title:event.event_name
    });

    marker.addListener("click",()=>{

      const content = `
        <div style="min-width:230px">

          <h3>${event.event_name}</h3>

          <p>${distanceText}</p>

          <p>${event.address || ""}</p>

          <p>
            📞 ${event.contact_number || ""}
          </p>

          <button
            onclick="openNavigation(${lat},${lng})"
            style="
              width:100%;
              background:#198754;
              color:white;
              border:none;
              padding:10px;
              border-radius:8px;
              cursor:pointer;
            ">
            Go Now
          </button>

        </div>
      `;

      infoWindow.setContent(content);

      infoWindow.open(map,marker);
    });

    addEventCard(event,lat,lng,distanceText);

  });
}

function addEventCard(event,lat,lng,distanceText){

  const card = document.createElement("div");

  card.className = "event-card";

  card.innerHTML = `
    <h3>${event.event_name}</h3>

    <div class="distance">
      ${distanceText}
    </div>

    <div>${event.address || ""}</div>

    <div class="contact">
      📞 ${event.contact_number || ""}
    </div>

    <br>

    <button class="go-btn"
      onclick="openNavigation(${lat},${lng})">
      Go
    </button>
  `;

  document.getElementById("eventList")
    .appendChild(card);
}

async function addEvent(){

  const event_name =
    document.getElementById("eventName").value;

  const lat =
    document.getElementById("lat").value;

  const lng =
    document.getElementById("lng").value;

  const address =
    document.getElementById("address").value;

  const contact_number =
    document.getElementById("contactNumber").value;

  if(
    !event_name ||
    !lat ||
    !lng ||
    !contact_number
  ){
    alert("Please fill all required fields");
    return;
  }

  const data = {
    event_name,
    lat,
    lng,
    address,
    contact_number
  };

  const response = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(data)
  });

  const result = await response.json();

  if(result.success){

    alert(
      "Event submitted successfully. Waiting for approval."
    );

    document.getElementById("eventName").value = "";
    document.getElementById("lat").value = "";
    document.getElementById("lng").value = "";
    document.getElementById("address").value = "";
    document.getElementById("contactNumber").value = "";

  }else{

    alert("Failed to save event");
  }
}

function openNavigation(lat,lng){

  const url =
    `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;

  window.open(url,"_blank");
}

function calculateDistance(lat1,lon1,lat2,lon2){

  const R = 6371;

  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon/2) *
    Math.sin(dLon/2);

  const c =
    2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

  return R * c;
}

function toRad(value){

  return value * Math.PI / 180;
}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAjrreJ435XJbTgxB2AbxVh3CH_XYRfLWw&callback=initMap">
</script>

</body>
</html>
